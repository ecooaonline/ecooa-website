name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: TypeScript check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Gate do Contrato de Páginas + Guardião regulatório
        # Bloqueante (Lei do Gate Honesto): valida rotas estratégicas no sitemap,
        # exclusão de utilitárias noindex, piso anti-perda, e zero termo de promessa
        # absoluta no output. Script: scripts/validate-output.mjs.
        run: npm run validate:output

      - name: Check internal links (non-blocking)
        continue-on-error: true
        run: |
          npx --yes linkinator dist/ --recurse --skip "^https?://" --verbosity ERROR || true
          echo "Link check concluído (não-bloqueante nesta fase)"

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # Desktop é gate bloqueante (docs/PERFORMANCE_BUDGET.md): LCP e CLS em "error".
      # Mobile permanece não-bloqueante até endurecermos os thresholds.
      - name: Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Lighthouse CI (mobile)
        if: always()
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.mobile.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
