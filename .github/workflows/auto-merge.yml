name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Verifica se já existe PR para este branch
          PR_URL=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url' 2>/dev/null || true)

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: merge $BRANCH" \
              --body "PR automática gerada pelo workflow. Merge ocorre após todos os quality gates (CI) passarem." \
              --draft=false)
            echo "PR criada: $PR_URL"
          else
            echo "PR existente: $PR_URL"
          fi

          # Habilita auto-merge (squash) — só executa quando required checks passarem
          gh pr merge --auto --squash "$PR_URL"
          echo "Auto-merge habilitado: $PR_URL"
